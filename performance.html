<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Ticker 表现追踪</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Performance Data -->
    <script src="ticker_performance_data.js"></script>

    <style>
        :root {
            --bg-color: #0f111a;
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        nav {
            margin-bottom: 2rem;
        }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #fff;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        .exchange-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .exchange-table th, .exchange-table td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .exchange-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .exchange-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }
    </style>
    <script src="lang.js"></script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" id="nav-back">&larr; 返回概览大屏</a>
        </nav>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <h1 class="header-title" class="i18n-header">博主提及标的表现追踪</h1>
            <p style="color: var(--text-secondary);" class="i18n-desc">从首次提及至今的股价追踪与回报率测算。请注意：此数据仅供分析，不构成投资建议。</p>
        </div>

        <!-- Mcap Distribution Chart -->
        <div class="glass-card" style="margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px;">
            <h2 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; text-align: center;" class="i18n-mcap-title">首次提及时市值分布</h2>
            <div style="position: relative; width: 100%; max-width: 400px; height: 300px;">
                <canvas id="mcapChart"></canvas>
            </div>
        </div>

        <!-- Performance Section -->
        <div class="glass-card">
            <!-- Summary Metrics -->
            <div style="display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <h3 style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 500;" class="i18n-win-rate">整体提及胜率</h3>
                    <div id="winRate" style="font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: #10B981;">--%</div>
                </div>
                <div style="flex: 1; min-width: 200px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <h3 style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 500;" class="i18n-avg-change">平均涨跌幅</h3>
                    <div id="avgChange" style="font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: #3B82F6;">--%</div>
                </div>
            </div>

            <div class="table-container">
                <table class="exchange-table" id="performanceTable">
                    <thead>
                        <tr>
                            <th class="i18n-th-ticker">标的 (Ticker)</th>
                            <th class="i18n-th-count">提及次数</th>
                            <th class="i18n-th-date">首次提到时间</th>
                            <th class="i18n-th-init-price">当时股价</th>
                            <th class="i18n-th-init-mcap">当时市值</th>
                            <th class="i18n-th-cur-price">当前股价</th>
                            <th class="i18n-th-cur-mcap">当前市值</th>
                            <th class="i18n-th-change">涨跌幅</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
        <p>© 2026 CasualStudy 随意研究. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initMcapChart();
            initPerformanceTable();
        });

        function formatMcap(val) {
            if (!val || val === "" || isNaN(val)) return "-";
            val = parseFloat(val);
            if (val >= 1e12) return "$" + (val / 1e12).toFixed(2) + "T";
            if (val >= 1e9) return "$" + (val / 1e9).toFixed(2) + "B";
            if (val >= 1e6) return "$" + (val / 1e6).toFixed(2) + "M";
            return "$" + val.toLocaleString();
        }

        function initMcapChart() {
            if (typeof performanceData === 'undefined') return;
            
            const ctx = document.getElementById('mcapChart').getContext('2d');
            
            let mega = 0, large = 0, mid = 0, small = 0, micro = 0, unknown = 0;
            
            performanceData.forEach(d => {
                const mcap = d.InitialMarketCap;
                if (!mcap || mcap === "") {
                    unknown++;
                } else {
                    const val = parseFloat(mcap);
                    if (val >= 200e9) mega++;
                    else if (val >= 10e9) large++;
                    else if (val >= 2e9) mid++;
                    else if (val >= 300e6) small++;
                    else micro++;
                }
            });
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: [
                        window.t('超大盘 (>$200B)'), 
                        window.t('大盘 ($10B-$200B)'), 
                        window.t('中盘 ($2B-$10B)'), 
                        window.t('小盘 ($300M-$2B)'), 
                        window.t('微盘 (<$300M)'), 
                        window.t('未知')
                    ],
                    datasets: [{
                        data: [mega, large, mid, small, micro, unknown],
                        backgroundColor: [
                            'rgba(139, 92, 246, 0.8)',   // Purple
                            'rgba(59, 130, 246, 0.8)',   // Blue
                            'rgba(16, 185, 129, 0.8)',   // Emerald
                            'rgba(245, 158, 11, 0.8)',   // Amber
                            'rgba(236, 72, 153, 0.8)',   // Pink
                            'rgba(107, 114, 128, 0.5)'   // Gray
                        ],
                        borderWidth: 1,
                        borderColor: 'rgba(255,255,255,0.1)',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                color: '#9CA3AF',
                                font: {
                                    family: "'Inter', sans-serif",
                                    size: 11,
                                    weight: '500'
                                },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(17, 24, 39, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 15,
                            cornerRadius: 12,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    if (label) label += ': ';
                                    const count = context.parsed;
                                    const total = context.dataset.data.reduce((a,b) => a + b, 0);
                                    const pct = ((count / total) * 100).toFixed(1);
                                    return label + count + window.t(' 支 (') + pct + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        function initPerformanceTable() {
            if (typeof performanceData === 'undefined') return;
            
            const validData = performanceData.filter(d => d.ChangePct !== "" && d.ChangePct !== null);
            if (validData.length === 0) return;
            
            let winCount = 0;
            let totalChange = 0;
            
            const tbody = document.querySelector('#performanceTable tbody');
            
            validData.forEach(d => {
                const change = parseFloat(d.ChangePct);
                if (change > 0) winCount++;
                totalChange += change;
                
                let changeColor = '#9CA3AF';
                let changeText = '-';
                if (change > 0) {
                    changeColor = '#34D399';
                    changeText = `+${change.toFixed(2)}%`;
                } else if (change < 0) {
                    changeColor = '#EF4444';
                    changeText = `${change.toFixed(2)}%`;
                } else {
                    changeText = `0.00%`;
                }
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 700; color: #fff;">${d.Ticker}</td>
                    <td style="color: #FBBF24; font-weight: 600;">${d.Frequency || 1} ${window.t('次')}</td>
                    <td style="color: #9CA3AF; font-size: 0.9rem;">${d.FirstMention}</td>
                    <td style="font-family: var(--font-display);">$${parseFloat(d.InitialPrice).toFixed(2)}</td>
                    <td style="font-family: var(--font-display); color: #D1D5DB;">${formatMcap(d.InitialMarketCap)}</td>
                    <td style="font-family: var(--font-display);">$${parseFloat(d.CurrentPrice).toFixed(2)}</td>
                    <td style="font-family: var(--font-display); color: #D1D5DB;">${formatMcap(d.CurrentMarketCap)}</td>
                    <td style="font-family: var(--font-display); font-weight: 700; color: ${changeColor};">${changeText}</td>
                `;
                tbody.appendChild(tr);
            });
            
            const winRate = (winCount / validData.length) * 100;
            const avgChange = totalChange / validData.length;
            
            const winRateEl = document.getElementById('winRate');
            const avgChangeEl = document.getElementById('avgChange');
            
            winRateEl.innerText = `${winRate.toFixed(2)}%`;
            avgChangeEl.innerText = avgChange > 0 ? `+${avgChange.toFixed(2)}%` : `${avgChange.toFixed(2)}%`;
            
            if (avgChange > 0) avgChangeEl.style.color = '#34D399';
            else if (avgChange < 0) avgChangeEl.style.color = '#EF4444';
            else avgChangeEl.style.color = '#9CA3AF';
        }
    </script>
</body>
</html>
