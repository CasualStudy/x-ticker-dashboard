<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Ticker 表现追踪</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Performance Data -->
    <script src="ticker_performance_data.js"></script>

    <style>
        :root {
            --bg-color: #0f111a;
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        nav {
            margin-bottom: 2rem;
        }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #fff;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        .exchange-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .exchange-table th, .exchange-table td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .exchange-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .exchange-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">&larr; 返回概览大屏</a>
        </nav>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <h1 class="header-title">博主提及标的表现追踪</h1>
            <p style="color: var(--text-secondary);">从首次提及至今的股价追踪与回报率测算。请注意：此数据仅供分析，不构成投资建议。</p>
        </div>

        <!-- Performance Section -->
        <div class="glass-card">
            <!-- Summary Metrics -->
            <div style="display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <h3 style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 500;">整体提及胜率</h3>
                    <div id="winRate" style="font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: #10B981;">--%</div>
                </div>
                <div style="flex: 1; min-width: 200px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <h3 style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 500;">平均涨跌幅</h3>
                    <div id="avgChange" style="font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: #3B82F6;">--%</div>
                </div>
            </div>

            <div class="table-container">
                <table class="exchange-table" id="performanceTable">
                    <thead>
                        <tr>
                            <th>标的 (Ticker)</th>
                            <th>提及次数</th>
                            <th>首次提到时间</th>
                            <th>当时股价</th>
                            <th>当时市值</th>
                            <th>当前股价</th>
                            <th>当前市值</th>
                            <th>涨跌幅</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPerformanceTable();
        });

        function formatMcap(val) {
            if (!val || val === "" || isNaN(val)) return "-";
            val = parseFloat(val);
            if (val >= 1e12) return "$" + (val / 1e12).toFixed(2) + "T";
            if (val >= 1e9) return "$" + (val / 1e9).toFixed(2) + "B";
            if (val >= 1e6) return "$" + (val / 1e6).toFixed(2) + "M";
            return "$" + val.toLocaleString();
        }

        function initPerformanceTable() {
            if (typeof performanceData === 'undefined') return;
            
            const validData = performanceData.filter(d => d.ChangePct !== "" && d.ChangePct !== null);
            if (validData.length === 0) return;
            
            let winCount = 0;
            let totalChange = 0;
            
            const tbody = document.querySelector('#performanceTable tbody');
            
            validData.forEach(d => {
                const change = parseFloat(d.ChangePct);
                if (change > 0) winCount++;
                totalChange += change;
                
                let changeColor = '#9CA3AF';
                let changeText = '-';
                if (change > 0) {
                    changeColor = '#34D399';
                    changeText = `+${change.toFixed(2)}%`;
                } else if (change < 0) {
                    changeColor = '#EF4444';
                    changeText = `${change.toFixed(2)}%`;
                } else {
                    changeText = `0.00%`;
                }
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 700; color: #fff;">${d.Ticker}</td>
                    <td style="color: #FBBF24; font-weight: 600;">${d.Frequency || 1} 次</td>
                    <td style="color: #9CA3AF; font-size: 0.9rem;">${d.FirstMention}</td>
                    <td style="font-family: var(--font-display);">$${parseFloat(d.InitialPrice).toFixed(2)}</td>
                    <td style="font-family: var(--font-display); color: #D1D5DB;">${formatMcap(d.InitialMarketCap)}</td>
                    <td style="font-family: var(--font-display);">$${parseFloat(d.CurrentPrice).toFixed(2)}</td>
                    <td style="font-family: var(--font-display); color: #D1D5DB;">${formatMcap(d.CurrentMarketCap)}</td>
                    <td style="font-family: var(--font-display); font-weight: 700; color: ${changeColor};">${changeText}</td>
                `;
                tbody.appendChild(tr);
            });
            
            const winRate = (winCount / validData.length) * 100;
            const avgChange = totalChange / validData.length;
            
            const winRateEl = document.getElementById('winRate');
            const avgChangeEl = document.getElementById('avgChange');
            
            winRateEl.innerText = `${winRate.toFixed(2)}%`;
            avgChangeEl.innerText = avgChange > 0 ? `+${avgChange.toFixed(2)}%` : `${avgChange.toFixed(2)}%`;
            
            if (avgChange > 0) avgChangeEl.style.color = '#34D399';
            else if (avgChange < 0) avgChangeEl.style.color = '#EF4444';
            else avgChangeEl.style.color = '#9CA3AF';
        }
    </script>
</body>
</html>
